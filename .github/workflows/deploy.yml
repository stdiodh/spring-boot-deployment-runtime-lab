name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches:
      - 09-answer

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RELEASE_DIR: /home/${{ secrets.EC2_USERNAME }}/aandi-deployment-runtime-lab
      APP_IMAGE: aandi-deployment-runtime-lab:latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run tests and build jar
        run: ./gradlew test bootJar

      - name: Prepare release bundle
        run: |
          rm -rf release
          mkdir -p release/build/libs
          cp build/libs/*.jar release/build/libs/app.jar
          cp Dockerfile release/Dockerfile
          cp .env.example release/.env.example
          cp -R deploy release/deploy

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/aandi-ec2.pem
          chmod 600 ~/.ssh/aandi-ec2.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          ssh -i ~/.ssh/aandi-ec2.pem "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" "mkdir -p ${RELEASE_DIR}"
          scp -i ~/.ssh/aandi-ec2.pem -r release/* "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:${RELEASE_DIR}/"

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/aandi-ec2.pem "${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}" <<EOF
            set -e
            cd ${RELEASE_DIR}
            cat > .env <<ENV
            SPRING_PROFILES_ACTIVE=prod
            DB_URL=${{ secrets.PROD_DB_URL }}
            DB_USERNAME=${{ secrets.PROD_DB_USERNAME }}
            DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}
            REDIS_HOST=${{ secrets.PROD_REDIS_HOST }}
            REDIS_PORT=${{ secrets.PROD_REDIS_PORT }}
            JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}
            JWT_EXPIRATION_MS=${{ secrets.PROD_JWT_EXPIRATION_MS }}
            MAIL_HOST=${{ secrets.PROD_MAIL_HOST }}
            MAIL_PORT=${{ secrets.PROD_MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.PROD_MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.PROD_MAIL_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.PROD_GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
            APP_FRONTEND_URL=${{ secrets.PROD_FRONTEND_URL }}
            APP_PASSWORD_RESET_URL=${{ secrets.PROD_PASSWORD_RESET_URL }}
            MYSQL_DATABASE=${{ secrets.PROD_MYSQL_DATABASE }}
            MYSQL_ROOT_PASSWORD=${{ secrets.PROD_MYSQL_ROOT_PASSWORD }}
            ENV
            docker compose -f deploy/compose.prod.yaml down || true
            docker build -t ${APP_IMAGE} .
            docker compose --env-file .env -f deploy/compose.prod.yaml up -d
            docker compose --env-file .env -f deploy/compose.prod.yaml ps
            docker logs --tail 50 aandi-app
          EOF
