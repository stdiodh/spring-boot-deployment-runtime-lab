name: CI

on:
  pull_request:
    branches:
      - 10-implementation
      - 10-answer
  push:
    branches:
      - 10-implementation

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant Gradle permission
        run: chmod +x gradlew

      - name: Run build and test
        run: ./gradlew test bootJar
